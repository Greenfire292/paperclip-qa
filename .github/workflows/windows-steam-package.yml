name: Windows Steam Packaging

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: windows-steam-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Gameplay + Smoke Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ARTIFACT_DIR: ${{ github.workspace }}/artifacts/qa-captures
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: qa/package-lock.json

      - name: Run gameplay unit tests
        run: node --test tests/gameplay.test.js

      - name: Install QA dependencies
        working-directory: qa
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: qa
        run: npx playwright install --with-deps chromium

      - name: Ensure writable artifact directories
        run: |
          mkdir -p "$ARTIFACT_DIR/test-results" "$ARTIFACT_DIR/html-report" "$ARTIFACT_DIR/screenshots"
          chmod -R u+rwX "$ARTIFACT_DIR"

      - name: Run smoke tests
        working-directory: qa
        run: npm test

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-captures-${{ github.run_number }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            artifacts/qa-captures/html-report
            artifacts/qa-captures/test-results
            artifacts/qa-captures/screenshots

  package-windows:
    name: Package Windows Candidate
    runs-on: windows-latest
    needs: tests
    timeout-minutes: 15
    env:
      APP_NAME: crownforge-prototype
      DIST_DIR: build/windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package version
        id: version
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0, 8)
          $version = "0.1.${{ github.run_number }}+${sha}"
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Assemble Steam candidate + local installer bundle
        shell: pwsh
        run: |
          ./scripts/windows/package-steam.ps1 -Version "$env:PACKAGE_VERSION" -OutputDir "$env:DIST_DIR"
          ./scripts/windows/create-local-installer.ps1 -Version "$env:PACKAGE_VERSION" -OutputDir "$env:DIST_DIR"

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-package-${{ github.run_number }}
          retention-days: 30
          if-no-files-found: error
          path: |
            build/windows/*.zip
            build/windows/*.ps1
            build/windows/*.json
