services:
  crownforge-app:
    image: python:3.12-slim
    working_dir: /site
    command: ["python3", "-m", "http.server", "4173", "--bind", "0.0.0.0"]
    volumes:
      - ./:/site:ro
    networks: [qa-capture-net]

  qa-capture:
    build:
      context: .
      dockerfile: docker/qa-capture/Dockerfile
    depends_on:
      - crownforge-app
    environment:
      BASE_URL: http://crownforge-app:4173
      ARTIFACT_DIR: /artifacts
    volumes:
      - ./artifacts/qa-captures:/artifacts
    networks: [qa-capture-net]
    profiles: [qa]

networks:
  qa-capture-net:
    driver: bridge
